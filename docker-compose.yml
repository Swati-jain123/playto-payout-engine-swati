version: "3.9"

services:
  backend:
    build: ./backend
    entrypoint: ["/app/entrypoint.sh"]
    command: gunicorn app.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8000:8000"

  celery:
    build: ./backend
    entrypoint: ["/app/entrypoint.sh"]
    command: celery -A app worker --loglevel=info --concurrency=2
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}

  celery-beat:
    build: ./backend
    entrypoint: ["/app/entrypoint.sh"]
    command: celery -A app beat --loglevel=info
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_URL: ${REDIS_URL}

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
